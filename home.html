<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Post Idealist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=VT323&family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #d4d4c1; font-family: 'Lora', Georgia, serif; min-height: 100vh; }
    ::selection { background: #e67e22; color: #1a1a2e; }
    a { color: #4a9aea; text-decoration: none; }
    a:hover { color: #e67e22; text-decoration: underline; }
    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-track { background: #0f0f23; }
    ::-webkit-scrollbar-thumb { background: #333366; border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: #4a4a8a; }
    button { font-family: inherit; }
    input, select, textarea { font-family: 'Courier Prime', monospace; background: #12122a; color: #d4d4c1; border: 1px solid #333366; padding: 8px 12px; font-size: 14px; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: #4a9aea; }
    @media (max-width: 768px) {
      .site-layout { flex-direction: column !important; }
      .site-sidebar { width: 100% !important; order: 2; }
      .site-main { order: 1; }
      .nav-bar { gap: 0 !important; }
      .nav-bar button { padding: 8px 14px !important; font-size: 12px !important; letter-spacing: 1px !important; }
      .feed-item { flex-direction: column !important; gap: 10px !important; }
      .feed-icon { width: 40px !important; height: 40px !important; font-size: 12px !important; }
      .feed-meta { flex-direction: column !important; gap: 2px !important; }
      .top-bar { flex-direction: column !important; gap: 2px !important; text-align: center !important; font-size: 11px !important; }
      .tool-header { flex-direction: column !important; }
      .algo-row { font-size: 11px !important; }
      .algo-row > div:nth-child(2) { width: 60px !important; }
    }
    @media (max-width: 480px) {
      .site-title { font-size: 28px !important; letter-spacing: 3px !important; }
      .article-body { padding: 20px !important; }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const VISITOR_COUNT = Math.floor(Math.random() * 1000001).toLocaleString('en-US').padStart(7, '0');

    // ==========================================
    // DATA FETCHING
    // ==========================================
    function useContent() {
      const [content, setContent] = useState(null);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        fetch('content.json?v=' + Date.now()).then(r => r.json())
          .then(data => { setContent(data); setLoading(false); })
          .catch(() => setLoading(false));
      }, []);
      return { content, loading };
    }

    function useJsonFile(filePath) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);
      useEffect(() => {
        if (!filePath) { setData(null); return; }
        setLoading(true);
        fetch(filePath + '?v=' + Date.now()).then(r => r.json())
          .then(d => { setData(d); setLoading(false); })
          .catch(() => setLoading(false));
      }, [filePath]);
      return { data, loading };
    }

    // ==========================================
    // ARTICLE SECTION RENDERERS
    // ==========================================
    function ScreenshotBox({ number, title, children }) {
      return (
        <div style={{ margin: "28px 0", border: "2px solid #333366", background: "#0a0a18", overflow: "hidden" }}>
          <div style={{ background: "#222244", padding: "6px 14px", fontFamily: "'VT323', monospace", fontSize: "13px", color: "#666680", borderBottom: "1px solid #333366", display: "flex", justifyContent: "space-between" }}>
            <span>Screenshot #{number}{title ? ": " + title : ""}</span>
            <span style={{ color: "#444460" }}>{"\u2715"}</span>
          </div>
          <div style={{ padding: "20px" }}>{children}</div>
        </div>
      );
    }

    function redact(text) {
      if (!text || typeof text !== 'string') return text;
      if (!text.includes('[R]') && !text.includes('[I]')) return text;
      const parts = [];
      let remaining = text;
      let key = 0;
      while (remaining.includes('[R]') || remaining.includes('[I]')) {
        const rIdx = remaining.indexOf('[R]');
        const iIdx = remaining.indexOf('[I]');
        const useR = rIdx !== -1 && (iIdx === -1 || rIdx < iIdx);
        const tag = useR ? '[R]' : '[I]';
        const closeTag = useR ? '[/R]' : '[/I]';
        const start = useR ? rIdx : iIdx;
        const end = remaining.indexOf(closeTag);
        if (end === -1) break;
        if (start > 0) parts.push(remaining.slice(0, start));
        const inner = remaining.slice(start + tag.length, end);
        if (useR) {
          parts.push(
            React.createElement('span', { key: key++, style: { background: '#111', color: '#111', padding: '1px 2px', borderRadius: '2px', userSelect: 'none', cursor: 'default', border: '1px solid #222', letterSpacing: '0px' }, title: 'REDACTED' }, inner)
          );
        } else {
          parts.push(
            React.createElement('span', { key: key++, style: { color: 'transparent', transition: 'color 0.3s', cursor: 'default' }, onMouseEnter: e => { e.target.style.color = '#666680'; }, onMouseLeave: e => { e.target.style.color = 'transparent'; } }, inner)
          );
        }
        remaining = remaining.slice(end + closeTag.length);
      }
      if (remaining) parts.push(remaining);
      return parts.length ? parts : text;
    }

    function ChatMessage({ speaker, text }) {
      const isU = speaker === "Unconscious";
      return (
        <div style={{ marginBottom: "8px", fontFamily: "'Courier Prime', monospace", fontSize: "14px", lineHeight: 1.8, color: "#b0b0a0" }}>
          <span style={{ color: isU ? "#e67e22" : "#4a9aea", fontWeight: "bold" }}>{isU ? "The Unconscious" : "Person " + speaker}:</span> <span>{redact(text)}</span>
        </div>
      );
    }

    function AlgorithmTable({ rows }) {
      return (
        <div>
          <div style={{ fontFamily: "'VT323', monospace", fontSize: "14px", color: "#666680", textAlign: "center", marginBottom: "12px", letterSpacing: "1px" }}>THE ALGORITHM'S THOUGHTS WHILE CHASING WATCHTIME</div>
          <div className="algo-row" style={{ display: "flex", borderBottom: "2px solid #333366", fontSize: "12px", fontFamily: "'VT323', monospace", color: "#4a4a8a", letterSpacing: "1px" }}>
            <div style={{ flex: 2, padding: "6px 10px" }}>VIDEO</div>
            <div style={{ width: "90px", padding: "6px 10px", textAlign: "center", borderLeft: "1px solid #222244" }}>WATCH TIME</div>
            <div style={{ flex: 3, padding: "6px 10px", borderLeft: "1px solid #222244" }}>ALGORITHM THINKS...</div>
          </div>
          {rows.map((row, i) => (
            <div key={i} className="algo-row" style={{ display: "flex", borderBottom: "1px solid #222244", fontSize: "13px" }}>
              <div style={{ flex: 2, padding: "8px 10px", color: "#c0c0b0" }}>{redact(row.title)}</div>
              <div style={{ width: "90px", padding: "8px 10px", color: "#666680", textAlign: "center", borderLeft: "1px solid #222244" }}>{row.time}</div>
              <div style={{ flex: 3, padding: "8px 10px", color: "#4a90d9", fontStyle: "italic", borderLeft: "1px solid #222244" }}>{redact(row.thought)}</div>
            </div>
          ))}
        </div>
      );
    }

    function PizzaSliderViz() {
      const [slices, setSlices] = useState(0);
      const maxSlices = 8;
      const enjoyData = [0, 95, 85, 68, 45, 20, 5, -10, -25];
      const regretData = [0, 0, 0, 5, 15, 35, 55, 75, 90];
      const labels = ["", "Transcendent. This is why pizza exists.", "Excellent. Nearly as good as the first.", "Good. You're still glad you ordered.", "Fine. This is just eating now.", "Why. You don't want this but you're eating it.", "Your body is asking you to stop.", "You have made an enemy of your stomach.", "Congratulations. You hate pizza now."];
      const enjoyment = enjoyData[slices] || 0;
      const regret = regretData[slices] || 0;

      return (
        <div style={{ border: "2px solid #333366", background: "#0a0a18", padding: "24px", margin: "28px 0" }}>
          <div style={{ fontFamily: "'VT323', monospace", fontSize: "16px", color: "#e67e22", letterSpacing: "2px", textTransform: "uppercase", marginBottom: "16px", textAlign: "center" }}>The Pizza Experiment</div>
          <div style={{ display: "flex", justifyContent: "center", gap: "6px", marginBottom: "16px", flexWrap: "wrap" }}>
            {Array.from({ length: maxSlices }).map((_, i) => (
              <div key={i} onClick={() => setSlices(i + 1)} style={{
                width: "48px", height: "48px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: "28px", background: i < slices ? (enjoyData[i+1] > 40 ? "#2a3a1a" : enjoyData[i+1] > 0 ? "#2a2a1a" : "#3a1a1a") : "#12122a",
                border: "1px solid " + (i < slices ? (enjoyData[i+1] > 40 ? "#4a8a3a" : enjoyData[i+1] > 0 ? "#8a8a3a" : "#8a3a3a") : "#222244"),
                transition: "all 0.2s", borderRadius: "4px"
              }}>{i < slices ? "\uD83C\uDF55" : "\u25CB"}</div>
            ))}
          </div>
          <div style={{ textAlign: "center", marginBottom: "20px" }}>
            <button onClick={() => setSlices(0)} style={{ background: "none", border: "1px solid #333366", color: "#666680", fontFamily: "'VT323', monospace", fontSize: "13px", padding: "4px 16px", cursor: "pointer" }}>Reset</button>
          </div>
          {slices > 0 && (
            <div style={{ marginBottom: "20px" }}>
              <div style={{ fontFamily: "'Courier Prime', monospace", fontSize: "14px", color: "#e8e8d0", textAlign: "center", marginBottom: "4px" }}>Slice {slices} of {maxSlices}</div>
              <div style={{ fontFamily: "'Lora', serif", fontSize: "14px", color: enjoyment > 40 ? "#4a9a4a" : enjoyment > 0 ? "#c0a060" : "#aa3333", textAlign: "center", fontStyle: "italic" }}>{labels[slices]}</div>
            </div>
          )}
          <div style={{ display: "flex", gap: "20px", flexWrap: "wrap" }}>
            <div style={{ flex: 1, minWidth: "200px" }}>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: "13px", color: "#4a9a4a", letterSpacing: "1px", marginBottom: "6px" }}>ENJOYMENT</div>
              <div style={{ height: "20px", background: "#12122a", border: "1px solid #222244", overflow: "hidden" }}>
                <div style={{ height: "100%", width: Math.max(0, enjoyment) + "%", background: enjoyment > 60 ? "linear-gradient(90deg, #2d7a2d, #4a9a4a)" : enjoyment > 30 ? "linear-gradient(90deg, #7a7a2d, #9a9a4a)" : "linear-gradient(90deg, #4a3a2d, #6a5a3a)", transition: "all 0.4s ease" }} />
              </div>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: "18px", color: enjoyment > 0 ? "#4a9a4a" : "#aa3333", textAlign: "right", marginTop: "4px" }}>{enjoyment > 0 ? enjoyment + "%" : enjoyment + "%"}</div>
            </div>
            <div style={{ flex: 1, minWidth: "200px" }}>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: "13px", color: "#aa3333", letterSpacing: "1px", marginBottom: "6px" }}>REGRET</div>
              <div style={{ height: "20px", background: "#12122a", border: "1px solid #222244", overflow: "hidden" }}>
                <div style={{ height: "100%", width: regret + "%", background: regret > 50 ? "linear-gradient(90deg, #7a2d2d, #aa3333)" : "linear-gradient(90deg, #5a3a2d, #7a4a3a)", transition: "all 0.4s ease" }} />
              </div>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: "18px", color: regret > 30 ? "#aa3333" : "#666680", textAlign: "right", marginTop: "4px" }}>{regret}%</div>
            </div>
          </div>
          {slices >= 5 && (
            <div style={{ marginTop: "16px", padding: "12px", background: "#1a1520", border: "1px dashed #aa3333", fontFamily: "'Courier Prime', monospace", fontSize: "13px", color: "#c0a060", textAlign: "center", fontStyle: "italic" }}>
              {slices === 5 && "You knew this was coming. You ate it anyway."}
              {slices === 6 && "The pizza hasn't changed. You have."}
              {slices === 7 && "This is no longer about hunger. This is about something else entirely."}
              {slices === 8 && "You just ate 8 slices of pizza in an economics article. The opportunity cost of this experiment was reading the rest of the article sooner. But you had to click every single one, didn't you."}
            </div>
          )}
        </div>
      );
    }

    function OvenSimViz() {
      const [guests, setGuests] = useState(0);
      const [ovens, setOvens] = useState(1);
      const maxGuests = 96;
      const ovenCap = 6;
      const totalCap = ovenCap * ovens;
      const withinCapacity = guests <= totalCap;
      const ovenCost = 100;

      const getCostPerGuest = (g, o) => {
        if (g === 0) return 0;
        const baseCost = o * ovenCost;
        const foodCost = g * 8;
        const workerCost = o > 1 ? (o - 1) * 40 : 0;
        return Math.round((baseCost + foodCost + workerCost) / g);
      };

      const costPerGuest = getCostPerGuest(guests, ovens);
      const prevCost = guests > 1 ? getCostPerGuest(guests - 1, ovens) : 0;
      const costDelta = guests > 1 ? costPerGuest - prevCost : 0;

      const ovenSlots = [];
      for (let o = 0; o < ovens; o++) {
        const slots = [];
        for (let s = 0; s < ovenCap; s++) {
          const guestIdx = o * ovenCap + s;
          slots.push(guestIdx < guests);
        }
        ovenSlots.push(slots);
      }

      const needsNewOven = guests > totalCap;
      const justCrossedThreshold = guests > 0 && guests === totalCap + 1;

      return (
        <div style={{ border: "2px solid #333366", background: "#0a0a18", padding: "24px", margin: "28px 0" }}>
          <div style={{ fontFamily: "'VT323', monospace", fontSize: "16px", color: "#e67e22", letterSpacing: "2px", textTransform: "uppercase", marginBottom: "16px", textAlign: "center" }}>The Kitchen Simulator</div>

          <div style={{ display: "flex", justifyContent: "center", gap: "12px", marginBottom: "20px", flexWrap: "wrap" }}>
            <button onClick={() => { setGuests(g => Math.max(0, g - 1)); }} style={{ background: "#12122a", border: "1px solid #333366", color: "#e8e8d0", fontFamily: "'VT323', monospace", fontSize: "20px", width: "40px", height: "40px", cursor: "pointer" }}>{"\u2212"}</button>
            <div style={{ fontFamily: "'VT323', monospace", fontSize: "28px", color: "#e8e8d0", display: "flex", alignItems: "center", minWidth: "140px", justifyContent: "center" }}>{guests} Guest{guests !== 1 ? "s" : ""}</div>
            <button onClick={() => { if (guests < maxGuests) setGuests(g => g + 1); }} style={{ background: "#12122a", border: "1px solid " + (needsNewOven ? "#aa3333" : "#333366"), color: needsNewOven ? "#aa3333" : "#e8e8d0", fontFamily: "'VT323', monospace", fontSize: "20px", width: "40px", height: "40px", cursor: "pointer" }}>+</button>
          </div>

          <div style={{ display: "flex", gap: "16px", justifyContent: "center", marginBottom: "20px", flexWrap: "wrap" }}>
            {ovenSlots.map((slots, oi) => (
              <div key={oi} style={{ border: "2px solid " + (slots.every(s => s) ? "#aa3333" : "#4a4a8a"), background: "#12122a", padding: "12px", minWidth: "140px", transition: "border-color 0.3s" }}>
                <div style={{ fontFamily: "'VT323', monospace", fontSize: "12px", color: "#666680", textAlign: "center", marginBottom: "8px" }}>OVEN {oi + 1}</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "4px" }}>
                  {slots.map((filled, si) => (
                    <div key={si} style={{ width: "36px", height: "24px", background: filled ? "#e67e2244" : "#1a1a2e", border: "1px solid " + (filled ? "#e67e22" : "#222244"), display: "flex", alignItems: "center", justifyContent: "center", fontSize: "14px", transition: "all 0.2s" }}>{filled ? "\uD83C\uDF72" : ""}</div>
                  ))}
                </div>
                <div style={{ fontFamily: "'VT323', monospace", fontSize: "11px", color: slots.every(s => s) ? "#aa3333" : "#4a9a4a", textAlign: "center", marginTop: "6px" }}>{slots.filter(s => s).length}/{ovenCap} {slots.every(s => s) ? "FULL" : ""}</div>
              </div>
            ))}
          </div>

          {needsNewOven && (
            <div style={{ textAlign: "center", marginBottom: "16px" }}>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: "14px", color: "#aa3333", marginBottom: "8px" }}>{"\u26A0"} CAPACITY EXCEEDED — Guest {guests} needs a new oven!</div>
              <button onClick={() => setOvens(o => o + 1)} style={{ background: "#aa3333", color: "#fff", border: "none", padding: "8px 24px", fontFamily: "'Courier Prime', monospace", fontSize: "13px", cursor: "pointer", letterSpacing: "1px" }}>Buy Oven #{ovens + 1} ($100)</button>
            </div>
          )}

          <div style={{ marginTop: "16px" }}>
            <div style={{ fontFamily: "'VT323', monospace", fontSize: "13px", color: "#4a9aea", letterSpacing: "1px", marginBottom: "8px" }}>COST PER GUEST</div>
            <div style={{ display: "flex", alignItems: "flex-end", gap: "3px", height: "100px", padding: "0 4px" }}>
              {Array.from({ length: Math.max(guests, 1) }).map((_, i) => {
                const c = getCostPerGuest(i + 1, i + 1 > ovenCap ? Math.ceil((i + 1) / ovenCap) : ovens > 1 && i + 1 > ovenCap * (ovens - 1) ? ovens : i + 1 <= ovenCap ? 1 : ovens);
                const actualC = getCostPerGuest(i + 1, Math.ceil((i + 1) / ovenCap));
                const h = Math.min(95, Math.max(10, actualC * 0.6));
                const isSpike = i > 0 && actualC > getCostPerGuest(i, Math.ceil(i / ovenCap)) + 10;
                return <div key={i} style={{ flex: 1, maxWidth: "36px", height: h + "%", background: isSpike ? "linear-gradient(180deg, #aa3333, #7a2222)" : "linear-gradient(180deg, #4a9aea, #2a6aaa)", border: "1px solid " + (isSpike ? "#cc4444" : "#5ab0ff"), borderBottom: "none", transition: "height 0.3s", display: "flex", alignItems: "flex-start", justifyContent: "center", paddingTop: "2px" }}>
                  <span style={{ fontFamily: "'VT323', monospace", fontSize: "10px", color: "#fff" }}>{i + 1}</span>
                </div>;
              })}
            </div>
            <div style={{ height: "2px", background: "#333366" }} />
          </div>

          {guests > 0 && (
            <div style={{ marginTop: "12px", display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: "8px" }}>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: "16px", color: "#e8e8d0" }}>Cost per guest: <span style={{ color: costDelta > 5 ? "#aa3333" : costDelta < -3 ? "#4a9a4a" : "#e67e22" }}>${costPerGuest}</span></div>
              {guests > 1 && <div style={{ fontFamily: "'VT323', monospace", fontSize: "14px", color: costDelta > 0 ? "#aa3333" : "#4a9a4a" }}>{costDelta > 0 ? "\u25B2" : "\u25BC"} ${Math.abs(costDelta)} vs previous guest</div>}
            </div>
          )}

          <div style={{ textAlign: "center", marginTop: "12px" }}>
            <button onClick={() => { setGuests(0); setOvens(1); }} style={{ background: "none", border: "1px solid #333366", color: "#666680", fontFamily: "'VT323', monospace", fontSize: "13px", padding: "4px 16px", cursor: "pointer" }}>Reset Kitchen</button>
          </div>

          {guests >= 6 && guests <= totalCap && ovens === 1 && (
            <div style={{ marginTop: "16px", padding: "12px", background: "#1a1520", border: "1px dashed #e67e22", fontFamily: "'Courier Prime', monospace", fontSize: "13px", color: "#c0a060", textAlign: "center", fontStyle: "italic" }}>
              The oven is getting full. Each guest is still getting cheaper — but you can feel the ceiling approaching.
            </div>
          )}
          {ovens === 2 && guests <= ovenCap + 2 && (
            <div style={{ marginTop: "16px", padding: "12px", background: "#1a1520", border: "1px dashed #4a9aea", fontFamily: "'Courier Prime', monospace", fontSize: "13px", color: "#c0a060", textAlign: "center", fontStyle: "italic" }}>
              New oven, new cost spike. You're paying for capacity you haven't filled yet. Keep adding guests — the economics will recover.
            </div>
          )}
          {ovens >= 2 && guests >= totalCap - 1 && guests <= totalCap && (
            <div style={{ marginTop: "16px", padding: "12px", background: "#1a1520", border: "1px dashed #4a9a4a", fontFamily: "'Courier Prime', monospace", fontSize: "13px", color: "#c0a060", textAlign: "center", fontStyle: "italic" }}>
              Look at that — cost per guest is dropping again. The second oven is paying for itself. This is economies of scale recovering after a capital threshold.
            </div>
          )}
          {guests >= 20 && guests < 40 && (
            <div style={{ marginTop: "16px", padding: "12px", background: "#1a1520", border: "1px dashed #e67e22", fontFamily: "'Courier Prime', monospace", fontSize: "13px", color: "#c0a060", textAlign: "center", fontStyle: "italic" }}>
              This is no longer a dinner party. This is a catering operation. You're going to need staff. And parking.
            </div>
          )}
          {guests >= 40 && guests < 60 && (
            <div style={{ marginTop: "16px", padding: "12px", background: "#1a1520", border: "1px dashed #e67e22", fontFamily: "'Courier Prime', monospace", fontSize: "13px", color: "#c0a060", textAlign: "center", fontStyle: "italic" }}>
              You are now running a restaurant. You will need a health inspection, a liquor licence, and a therapist.
            </div>
          )}
          {guests >= 60 && guests < 80 && (
            <div style={{ marginTop: "16px", padding: "12px", background: "#1a1520", border: "1px dashed #aa3333", fontFamily: "'Courier Prime', monospace", fontSize: "13px", color: "#c0a060", textAlign: "center", fontStyle: "italic" }}>
              Sixty guests. You've crossed from hospitality into logistics. Someone is eating in the garden. Someone else is eating in the car.
            </div>
          )}
          {guests >= 80 && guests < 96 && (
            <div style={{ marginTop: "16px", padding: "12px", background: "#1a1520", border: "1px dashed #aa3333", fontFamily: "'Courier Prime', monospace", fontSize: "13px", color: "#c0a060", textAlign: "center", fontStyle: "italic" }}>
              You are now feeding a small wedding. The original four guests have not been seen for some time. They may have left. No one noticed.
            </div>
          )}
          {guests >= 96 && (

    function HegemmonicaSystemViz() {
      const initModules = [
        { id: "sales", name: "Sales", health: 82, improved: 0, bottleneck: false },
        { id: "onboarding", name: "Onboarding", health: 31, improved: 0, bottleneck: true },
        { id: "accounting", name: "Accounting", health: 88, improved: 0, bottleneck: false },
        { id: "website", name: "Website", health: 55, improved: 0, bottleneck: false },
        { id: "support", name: "Support", health: 50, improved: 0, bottleneck: false },
        { id: "filing", name: "Shared Drive", health: 93, improved: 0, bottleneck: false }
      ];
      const [modules, setModules] = useState(initModules);
      const [energy, setEnergy] = useState(7);
      const [log, setLog] = useState([]);
      const [ascended, setAscended] = useState(false);
      const maxEnergy = 7;

      const filing = modules.find(m => m.id === "filing");
      const filingPerfect = filing && filing.health >= 100;

      const improve = (id) => {
        if (energy <= 0) return;
        setModules(prev => {
          const next = prev.map(m => {
            if (m.id !== id) return m;
            const newHealth = m.id === "filing" ? Math.min(100, m.health + 1) : Math.min(99, m.health + 8);
            return { ...m, health: newHealth, improved: m.improved + 1 };
          });
          const f = next.find(m => m.id === "filing");
          if (f && f.health >= 100) {
            setAscended(true);
            return next.map(m => ({ ...m, health: 100 }));
          }
          return next;
        });
        setEnergy(e => e - 1);
        const mod = modules.find(m => m.id === id);
        if (id === "filing") {
          const clicks = mod.improved + 1;
          const msgs = [
            "You improved Shared Drive. It's still 99%. Nothing visible changed.",
            "You improved Shared Drive again. Still 99%. The folders are... more organised, maybe?",
            "Third time on the Shared Drive. Still 99%. You are aware the Onboarding module is at 31%, right?",
            "Four energy on a module that was already at 99%. This is the behaviour the article is about.",
            "Five. You've spent five improvement points on the Shared Drive. It has not moved. It will not move. It doesn't need to move.",
            "Six energy on the Shared Drive. You have one energy left. Onboarding is still broken. We are begging you.",
            "...oh."
          ];
          setLog(l => [...l, msgs[Math.min(clicks - 1, msgs.length - 1)]]);
        } else if (mod.bottleneck) {
          setLog(l => [...l, "You improved " + mod.name + ". This was the bottleneck. Good use of energy."]);

          {log.length > 0 && (

              {log.map((l, i) => <div key={i} style={{ fontFamily: "'Courier Prime', monospace", fontSize: "12px", color: l.includes("bottleneck") || l.includes("Perfection") ? "#4a9a4a" : l.includes("already fine") || l.includes("choosing this") ? "#aa3333" : "#c0a060", marginBottom: "4px" }}>{"> " + l}</div>)}
            </div>
          )}

          {ascended && (
            <div style={{ padding: "16px", background: "#1a1a08", border: "2px solid #ffd700", fontFamily: "'Courier Prime', monospace", fontSize: "13px", color: "#ffd700", textAlign: "center", marginBottom: "12px" }}>
              We... we owe you an apology. We wrote an entire article about how the Shared Drive didn't need improving, and you went ahead and improved it to 100%, and — look at this. Everything is at 100%. Every module. We can't explain it. We've never seen it happen before. The Onboarding module fixed itself. Support and Website somehow jumped to perfection. The entire system is running flawlessly and all you did was organise some folders.<br /><br />
              We take it all back. We just never saw the vision. You were right about the Shared Drive. You were always right about the Shared Drive.
            </div>

          {energy === 0 && !ascended && (
            <div style={{ padding: "12px", background: "#1a1520", border: "1px dashed " + (bottleneck.improved > 0 ? "#4a9a4a" : "#aa3333"), fontFamily: "'Courier Prime', monospace", fontSize: "13px", color: "#c0a060", textAlign: "center", fontStyle: "italic", marginBottom: "12px" }}>
              {bottleneck.improved === 0 && wastedEnergy >= 3 && "You spent all your energy and never touched Onboarding — the one module that was actually failing. The system output didn't change. Everything you improved was already fine."}
              {bottleneck.improved === 0 && wastedEnergy < 3 && "You didn't fix the bottleneck. The system is still limited by its weakest module — no matter how much you improved everything else."}
              {bottleneck.improved > 0 && bottleneck.improved < 3 && "You found the bottleneck, but you also spent energy on modules that were already working. Partial credit."}
              {bottleneck.improved >= 3 && wastedEnergy < 2 && "You identified the bottleneck and focused your energy on it. The system output improved because the weakest link got stronger. This is triage."}
              {bottleneck.improved >= 3 && wastedEnergy >= 2 && "You found the bottleneck but couldn't resist tinkering with things that were already working. The Shared Drive was at 99%. It did not need you."}
              {filingImproved > 0 && !ascended && " The Shared Drive was hegemonica."}
            </div>
          )}

          <div style={{ textAlign: "center" }}>
            <button onClick={reset} style={{ background: "none", border: "1px solid " + (ascended ? "#ffd700" : "#333366"), color: ascended ? "#ffd700" : "#666680", fontFamily: "'VT323', monospace", fontSize: "13px", padding: "4px 16px", cursor: "pointer" }}>{ascended ? "Return to Reality" : "Reset System"}</button>

    function CompoundSimViz() {
      const [weekly, setWeekly] = useState(0);
      const [years, setYears] = useState(5);
      const rate = 0.07;

      const calculate = (w, y) => {
        if (w === 0) return Array(y + 1).fill(0);
        const pts = [0];
        let total = 0;
        for (let yr = 1; yr <= y; yr++) {
          for (let wk = 0; wk < 52; wk++) {
            total += w;
            total *= 1 + rate / 52;
          }
          pts.push(Math.round(total));
        }
        return pts;
      };

      const data = calculate(weekly, years);
      const maxVal = Math.max(...data, 1);
      const totalSaved = weekly * 52 * years;
      const interest = data[years] - totalSaved;

      const presets = [
        { label: "$0", value: 0 },
        { label: "$10", value: 10 },
        { label: "$25", value: 25 },
        { label: "$50", value: 50 }

        <div style={{ border: "2px solid #333366", background: "#0a0a18", padding: "24px", margin: "28px 0" }}>

                background: years === y ? "#e67e22" : "#12122a", border: "1px solid " + (years === y ? "#e67e22" : "#333366"),
                color: years === y ? "#fff" : "#888880", fontFamily: "'VT323', monospace", fontSize: "14px", padding: "4px 12px", cursor: "pointer", transition: "all 0.2s"

          <div style={{ height: "160px", display: "flex", alignItems: "flex-end", gap: "2px", padding: "0 4px", marginBottom: "4px" }}>
            {data.map((val, i) => {
              const h = maxVal > 0 ? (val / maxVal) * 100 : 0;
              return (
                <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", height: "100%" }}>
                  <div style={{
                    width: "100%", maxWidth: "28px", height: h + "%", minHeight: i === 0 && weekly === 0 ? "0px" : i === 0 ? "2px" : "0px",
                    background: weekly === 0 ? "#333366" : "linear-gradient(180deg, #4a9aea, #2a6aaa)",
                    border: h > 0 ? "1px solid " + (weekly === 0 ? "#444466" : "#5ab0ff") : "none", borderBottom: "none",
                    transition: "height 0.5s ease"
                  }} />
                </div>
              );
            })}
          </div>
          <div style={{ height: "2px", background: "#333366", marginBottom: "8px" }} />
          <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'VT323', monospace", fontSize: "11px", color: "#555560" }}>
            <span>Year 0</span><span>Year {years}</span>
          </div>

          <div style={{ marginTop: "16px", display: "flex", justifyContent: "space-around", flexWrap: "wrap", gap: "12px" }}>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: "12px", color: "#666680" }}>TOTAL SAVED</div>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: "22px", color: "#e8e8d0" }}>${totalSaved.toLocaleString()}</div>

            <div style={{ textAlign: "center" }}>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: "12px", color: "#666680" }}>COMPOUND INTEREST</div>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: "22px", color: interest > 0 ? "#4a9a4a" : "#555560" }}>${interest > 0 ? interest.toLocaleString() : "0"}</div>
            </div>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: "12px", color: "#666680" }}>TOTAL VALUE</div>

            </div>
          )}
        </div>
      );
    }

    function RippleSimViz() {
      const canvasRef = React.useRef(null);
      const [activeRing, setActiveRing] = useState(-1);
      const frameRef = React.useRef(0);
      const ringLabels = ["Source", "Inner Circle", "Early Adopters", "Mainstream", "Last to Know"];
      const ringColors = ["#ffd700", "#4a9aea", "#4a9a4a", "#c0a060", "#aa3333"];
      const ringDescs = [
        "The lab. The boardroom. The group chat. You made it or you were in the room when it was made.",
        "Journalists, analysts, the person who follows the right accounts. Still early. Best positions still available.",
        "The trend piece. The conference talk. Information is public now. Acting on it still helps, but the advantage is shrinking.",
        "The headline. The evening news. The thing everyone's talking about. It's priced in. You're not early.",
        "The dinner party, six months later. \"Did you know that...\" Yes. Everyone knew."
      ];

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const W = 570, H = 280;
        let anim;

        function render() {
          frameRef.current++;
          const f = frameRef.current;
          ctx.fillStyle = '#0a0a18';
          ctx.fillRect(0, 0, W, H);

          const cx = W / 2, cy = H / 2;
          const maxR = 120;

          // Draw rings from outside in
          for (let i = 4; i >= 0; i--) {
            const r = maxR * ((i + 1) / 5);
            const isActive = activeRing === i;
            const pulseAmt = isActive ? 4 + Math.sin(f * 0.05) * 3 : 0;

            ctx.beginPath();
            ctx.arc(cx, cy, r + pulseAmt, 0, Math.PI * 2);
            ctx.fillStyle = ringColors[i] + (isActive ? "33" : "11");
            ctx.fill();
            ctx.strokeStyle = ringColors[i] + (isActive ? "aa" : "44");
            ctx.lineWidth = isActive ? 2 : 1;
            ctx.stroke();
          }

          // Animated ripple wave
          const waveR = ((f * 0.8) % (maxR + 40));
          if (activeRing === -1) {
            ctx.beginPath();
            ctx.arc(cx, cy, waveR, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,215,0,' + Math.max(0, 1 - waveR / (maxR + 40)) * 0.5 + ')';
            ctx.lineWidth = 2;
            ctx.stroke();
          }

          // Center dot
          ctx.beginPath();
          ctx.arc(cx, cy, 5 + Math.sin(f * 0.04) * 1.5, 0, Math.PI * 2);
          ctx.fillStyle = '#ffd700';
          ctx.fill();
          ctx.shadowBlur = 0;

          // Little figures at each ring
          for (let i = 0; i < 5; i++) {
            const ringR = maxR * ((i + 1) / 5) * 0.75;
            const count = i === 0 ? 1 : (i + 1) * 2;
            for (let j = 0; j < count; j++) {
              const angle = (j / count) * Math.PI * 2 + i * 0.5;
              const fx = cx + Math.cos(angle) * ringR;
              const fy = cy + Math.sin(angle) * ringR;
              ctx.fillStyle = ringColors[i] + (activeRing === i ? "cc" : "66");
              ctx.fillRect(fx - 2, fy - 4, 4, 6);
              ctx.fillRect(fx - 1, fy - 6, 2, 3);
            }
          }

          anim = requestAnimationFrame(render);
        }
        render();
        return () => cancelAnimationFrame(anim);
      }, [activeRing]);

      return (
        <div style={{ border: "2px solid #333366", background: "#0a0a18", padding: "24px", margin: "28px 0" }}>
          <div style={{ fontFamily: "'VT323', monospace", fontSize: "16px", color: "#e67e22", letterSpacing: "2px", textTransform: "uppercase", marginBottom: "16px", textAlign: "center" }}>The Cantillon Ripple</div>

          <canvas ref={canvasRef} width={570} height={280}
            style={{ width: "100%", height: "auto", display: "block", marginBottom: "16px" }} />

          <div style={{ display: "flex", justifyContent: "center", gap: "6px", marginBottom: "16px", flexWrap: "wrap" }}>
            {ringLabels.map((label, i) => (
              <button key={i}
                onClick={() => setActiveRing(activeRing === i ? -1 : i)}
                style={{
                  background: activeRing === i ? ringColors[i] + "33" : "#12122a",
                  border: "1px solid " + (activeRing === i ? ringColors[i] : "#333366"),
                  color: activeRing === i ? ringColors[i] : "#888880",
                  fontFamily: "'VT323', monospace", fontSize: "13px", padding: "6px 12px", cursor: "pointer", transition: "all 0.2s"
                }}
              >{label}</button>
            ))}
          </div>

          {activeRing >= 0 && (
            <div style={{ padding: "12px", background: "#1a1520", border: "1px dashed " + ringColors[activeRing], fontFamily: "'Courier Prime', monospace", fontSize: "13px", color: "#c0a060", textAlign: "center", fontStyle: "italic", transition: "all 0.3s" }}>
              {ringDescs[activeRing]}
            </div>
          )}

          {activeRing === -1 && (
            <div style={{ fontFamily: "'Courier Prime', monospace", fontSize: "12px", color: "#555560", textAlign: "center" }}>
              Click a ring to see where you might be standing.
            </div>
          )}
        </div>
      );
    }

    function InteractiveArticleRenderer({ data, goBack }) {
      const [scene, setScene] = useState(data.start || "opening");
      const [history, setHistory] = useState([]);
      const sceneRef = React.useRef(null);
      const sc = data.scenes[scene];

      const goToScene = useCallback((id) => {
        setHistory(h => [...h, scene]);
        setScene(id);
        setTimeout(() => { if (sceneRef.current) sceneRef.current.scrollIntoView({ behavior: "smooth", block: "start" }); }, 50);
      }, [scene]);

      const handleGoBack = useCallback(() => {
        if (sc.goBack) {
          setScene(sc.goBack);
          setHistory(h => h.slice(0, -1));
          setTimeout(() => { if (sceneRef.current) sceneRef.current.scrollIntoView({ behavior: "smooth", block: "start" }); }, 50);
        }
      }, [sc]);

      const isScolding = !!sc.goBack;

      return (
        <div>
          <button onClick={goBack} style={{ background: "none", border: "none", color: "#4a9aea", fontFamily: "'Courier Prime', monospace", fontSize: "14px", cursor: "pointer", marginBottom: "20px", padding: 0 }}>{"\u2190 Back to articles"}</button>
          <article ref={sceneRef} className="article-body" style={{ border: "1px solid " + (isScolding ? "#aa3333" : "#333366"), background: "#0f0f23", padding: "40px", maxWidth: "720px", transition: "border-color 0.3s" }}>
            {scene === data.start && <>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: "13px", color: "#4a4a8a", letterSpacing: "2px", marginBottom: "8px" }}>{data.category} {"\u00b7"} {data.readTime || "10 min"} {"\u00b7"} {new Date(data.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</div>
              <h2 style={{ fontFamily: "'Special Elite', monospace", fontSize: "34px", color: "#e8e8d0", lineHeight: 1.2, marginBottom: "6px" }}>{data.title}</h2>
              <p style={{ fontFamily: "'Courier Prime', monospace", fontSize: "16px", color: "#888880", fontStyle: "italic", marginBottom: "24px" }}>{redact(data.subtitle)}</p>
              <div style={{ width: "40px", height: "2px", background: "#e67e22", marginBottom: "28px" }} />
            </>}
            {sc.content.map((para, i) => {
              if (para === "\u2026" || para === "\u2022 \u2022 \u2022") return <div key={i} style={{ textAlign: "center", color: "#555560", fontSize: "20px", margin: "20px 0", letterSpacing: "8px" }}>{para}</div>;
              if (para === "THE END") return <div key={i} style={{ textAlign: "center", fontFamily: "'Special Elite', monospace", fontSize: "28px", color: "#e67e22", letterSpacing: "6px", margin: "32px 0" }}>{para}</div>;
              const isDialogue = para.startsWith('"') || para.startsWith('\u201c');
              return <p key={i} style={{ fontSize: "16px", lineHeight: 1.9, color: isScolding && i >= sc.content.indexOf("\u2026") + 1 ? "#c0a060" : "#c8c8b8", marginBottom: "16px", fontStyle: isDialogue ? "normal" : "italic" }}>{redact(para)}</p>;
            })}
            {sc.choices && (
              <div style={{ marginTop: "32px", paddingTop: "24px", borderTop: "2px solid #333366", display: "flex", flexDirection: "column", gap: "12px" }}>
                <div style={{ fontFamily: "'VT323', monospace", fontSize: "14px", color: "#666680", letterSpacing: "2px", textTransform: "uppercase", marginBottom: "4px" }}>What does Claire do?</div>
                {sc.choices.map((c, i) => (
                  <button key={i} onClick={() => goToScene(c.goto)} style={{ background: "#12122a", border: "1px solid #4a4a8a", padding: "14px 20px", color: "#e8e8d0", fontFamily: "'Courier Prime', monospace", fontSize: "15px", cursor: "pointer", textAlign: "left", transition: "all 0.2s" }}
                    onMouseEnter={e => { e.target.style.borderColor = "#e67e22"; e.target.style.background = "#1a1530"; }}
                    onMouseLeave={e => { e.target.style.borderColor = "#4a4a8a"; e.target.style.background = "#12122a"; }}
                  >{"\u2192 " + c.label}</button>
                ))}
              </div>
            )}
            {sc.goBack && (
              <div style={{ marginTop: "32px", paddingTop: "24px", borderTop: "2px solid #aa3333", textAlign: "center" }}>
                <button onClick={handleGoBack} style={{ background: "none", border: "2px solid #4a9aea", padding: "12px 32px", color: "#4a9aea", fontFamily: "'Courier Prime', monospace", fontSize: "14px", cursor: "pointer", letterSpacing: "1px", transition: "all 0.2s" }}
                  onMouseEnter={e => { e.target.style.background = "#4a9aea"; e.target.style.color = "#fff"; }}
                  onMouseLeave={e => { e.target.style.background = "none"; e.target.style.color = "#4a9aea"; }}
                >{"\u2190 Go back and choose differently"}</button>
              </div>
            )}
          </article>
        </div>
      );
    }

    function StackModule() {

      const add = () => { if (input.trim()) { setItems(p => [input.trim(), ...p]); setInput(""); } };

        <div style={{ border: "2px dashed #4a90d9", padding: "24px", background: "#0f1028", margin: "28px 0" }}>
          <div style={{ fontFamily: "'VT323', monospace", fontSize: "16px", color: "#4a90d9", letterSpacing: "2px", textTransform: "uppercase", marginBottom: "12px" }}>{"\u26A1"} Interactive: The Stack</div>
          <p style={{ fontSize: "14px", color: "#888880", marginBottom: "12px", fontStyle: "italic" }}>Capture a thought. Watch it stack.</p>
          <div style={{ display: "flex", gap: "8px", marginBottom: "16px" }}><input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && add()} placeholder="Type a thought..." style={{ flex: 1 }} /><button onClick={add} style={{ background: "#4a90d9", color: "#fff", border: "none", padding: "8px 16px", fontFamily: "'Courier Prime', monospace", fontSize: "13px", cursor: "pointer" }}>Save</button></div>
          <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>{items.map((it, i) => <div key={i} style={{ padding: "8px 14px", background: "#1a2a4a", border: "1px solid #333366", fontFamily: "'Courier Prime', monospace", fontSize: "13px", color: "#b0b0a0", transform: "translateX(" + (i*4) + "px)", opacity: Math.max(0.4, 1-i*0.15) }}>{it}</div>)}</div>

          <p style={{ fontSize: "14px", color: "#888880", marginBottom: "16px", fontStyle: "italic" }}>Type your 5-year vision in the center. Watch the grid awaken.</p>

            <div style={{ display: "flex", alignItems: "center", gap: "10px" }}><div style={{ width: "14px", height: "14px", borderRadius: "50%", background: "#4a9a4a", boxShadow: "0 0 8px #4a9a4a80" }} /><span style={{ fontFamily: "'VT323', monospace", fontSize: "16px", color: "#4a9a4a" }}>Local Storage: ON</span></div>

    const INTERACTIVE_MODULES = {
      "cognitive-container": () => <CognitiveContainerModule />,

    // ==========================================
    // TOOL SECTION RENDERER
    // ==========================================
    function RenderToolSection({ section, toolData }) {
      switch (section.type) {
        case "heading": return <h3 style={{ fontFamily: "'Special Elite', monospace", fontSize: "22px", color: "#e67e22", marginBottom: "12px", marginTop: "32px" }}>{section.content}</h3>;
        case "text": return <p style={{ fontSize: "16px", lineHeight: 1.9, color: "#c0c0b0", marginBottom: "16px" }}>{section.content}</p>;
        case "features": return <div style={{ marginBottom: "24px" }}>{section.content.map((f, i) => <p key={i} style={{ fontSize: "15px", lineHeight: 1.7, color: "#b0b0a0", marginBottom: "8px", paddingLeft: "16px", borderLeft: "2px solid " + (toolData.color || "#4a90d9") }}>{f}</p>)}</div>;
        case "steps": return <div>{section.content.map((step, i) => <div key={i} style={{ display: "flex", gap: "16px", marginBottom: "16px", alignItems: "flex-start" }}><div style={{ fontFamily: "'VT323', monospace", fontSize: "24px", color: toolData.color || "#e67e22", width: "30px", textAlign: "center", flexShrink: 0 }}>{i+1}</div><div><div style={{ fontFamily: "'Courier Prime', monospace", fontSize: "15px", color: "#e8e8d0", fontWeight: "bold", marginBottom: "4px" }}>{step.title}</div><p style={{ fontSize: "15px", lineHeight: 1.7, color: "#b0b0a0" }}>{step.text}</p></div></div>)}</div>;
        case "callout": return <div style={{ marginTop: "24px", padding: "16px", background: "#1a2010", border: "1px solid #3a5a2a" }}><p style={{ fontSize: "15px", lineHeight: 1.7, color: "#b0b0a0" }}>{section.content}</p></div>;
        case "interactive": {
          const mod = INTERACTIVE_MODULES[section.module];
          return mod ? mod({ toolUrl: toolData.url }) : null;
        }
        default: return null;
      }
    }

    function ToolRenderer({ data, goBack }) {
      if (!data) return <div style={{ fontFamily: "'VT323', monospace", color: "#666680", padding: "40px", textAlign: "center" }}>Loading...</div>;
      const hasSections = data.sections && data.sections.length > 0;
      const hasUrl = data.url && data.url !== "#";
      return (
        <div>
          <button onClick={goBack} style={{ background: "none", border: "none", color: "#4a9aea", fontFamily: "'Courier Prime', monospace", fontSize: "14px", cursor: "pointer", marginBottom: "20px", padding: 0 }}>{"\u2190 Back to all tools"}</button>
          <div style={{ border: "2px solid " + (data.color || "#4a90d9"), background: "#0f0f23", padding: "32px" }}>

              <div style={{ flex: 1 }}>
                <h2 style={{ fontFamily: "'Special Elite', monospace", fontSize: "32px", color: "#e8e8d0" }}>{data.title}</h2>
                <p style={{ fontFamily: "'Courier Prime', monospace", fontSize: "16px", color: data.color||"#4a90d9", fontStyle: "italic" }}>{data.tagline}</p>
                <div style={{ display: "flex", gap: "12px", alignItems: "center", marginTop: "12px", flexWrap: "wrap" }}>
                  {hasUrl && <a href={data.url} target="_blank" rel="noopener" style={{ display: "inline-block", background: data.color||"#4a90d9", color: "#fff", padding: "8px 24px", fontFamily: "'Courier Prime', monospace", fontSize: "13px", fontWeight: "bold", letterSpacing: "2px", textTransform: "uppercase", textDecoration: "none" }}>{"Launch App \u2192"}</a>}
                  {data.tech && data.tech.map(t => <span key={t} style={{ fontFamily: "'VT323', monospace", fontSize: "14px", color: "#888880", background: "#1a1a2e", padding: "2px 10px", border: "1px solid #333366" }}>{t}</span>)}

            )}
          </div>
        </div>
      );

    // ==========================================
    // CHAPTER RENDERER
    // ==========================================
    function ChapterRenderer({ data, chapterMeta, allChapters, goBack, onNav }) {
      if (!data) return <div style={{ fontFamily: "'VT323', monospace", color: "#666680", padding: "40px", textAlign: "center" }}>Loading...</div>;
      const idx = allChapters.findIndex(c => c.id === chapterMeta.id);
      const prev = idx > 0 ? allChapters[idx-1] : null;
      const next = idx < allChapters.length-1 ? allChapters[idx+1] : null;
      return (
        <div>
          <button onClick={goBack} style={{ background: "none", border: "none", color: "#4a9aea", fontFamily: "'Courier Prime', monospace", fontSize: "14px", cursor: "pointer", marginBottom: "20px", padding: 0 }}>{"\u2190 Back to chapters"}</button>
          <article className="article-body" style={{ border: "1px solid #333366", background: "#0f0f23", padding: "40px", maxWidth: "720px" }}>
            <div style={{ fontFamily: "'VT323', monospace", fontSize: "13px", color: "#4a4a8a", letterSpacing: "2px", marginBottom: "8px" }}>Chapter {(idx+1)}</div>
            <h2 style={{ fontFamily: "'Special Elite', monospace", fontSize: "34px", color: "#e8e8d0", lineHeight: 1.2, marginBottom: "24px" }}>{data.title || chapterMeta.title}</h2>
            <div style={{ width: "40px", height: "2px", background: "#e67e22", marginBottom: "28px" }} />

              {prev ? <button onClick={() => onNav(prev.id)} style={{ background: "none", border: "none", color: "#4a9aea", fontFamily: "'Courier Prime', monospace", fontSize: "14px", cursor: "pointer", padding: 0 }}>{"\u2190 " + prev.title}</button> : <span />}
              {next ? <button onClick={() => onNav(next.id)} style={{ background: "none", border: "none", color: "#4a9aea", fontFamily: "'Courier Prime', monospace", fontSize: "14px", cursor: "pointer", padding: 0 }}>{next.title + " \u2192"}</button> : <span />}
            </div>
          </article>
        </div>
      );
    }

    function ForestBanner({ onClick }) {
      const canvasRef = React.useRef(null);
      const frameRef = React.useRef(0);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        const W = canvas.width, H = canvas.height;
        const PX = 3; // pixel scale

        function drawPixelRect(x, y, w, h, color) {
          ctx.fillStyle = color;
          ctx.fillRect(x*PX, y*PX, w*PX, h*PX);
        }

        function drawTree(ox, oy, type) {
          const colors = [
            { trunk: '#5d4037', leaves: ['#2e7d32','#388e3c','#43a047'] },
            { trunk: '#4e342e', leaves: ['#1b5e20','#2e7d32','#388e3c'] },
            { trunk: '#6d4c41', leaves: ['#558b2f','#689f38','#7cb342'] },
            { trunk: '#3e2723', leaves: ['#4a148c','#6a1b9a','#7b1fa2'] }
          ];
          const c = colors[type % 4];
          drawPixelRect(ox+4, oy+15, 3, 17, c.trunk);
          drawPixelRect(ox+5, oy+15, 1, 17, '#3e2723');
          drawPixelRect(ox, oy+3, 11, 7, c.leaves[0]);
          drawPixelRect(ox-1, oy+8, 13, 6, c.leaves[1]);
          drawPixelRect(ox+1, oy+12, 10, 5, c.leaves[2]);
          drawPixelRect(ox+2, oy, 5, 4, c.leaves[0]);
        }

        function drawPlayer(ox, oy, bob) {
          const by = Math.round(bob);
          // Cloak
          drawPixelRect(ox+3, oy+8+by, 8, 12, '#2980b9');
          drawPixelRect(ox+2, oy+20+by, 10, 4, '#2980b9');
          // Head
          drawPixelRect(ox+4, oy+3+by, 6, 6, '#fad7a0');
          // Hair
          drawPixelRect(ox+4, oy+2+by, 6, 3, '#8b4513');
          drawPixelRect(ox+3, oy+3+by, 2, 2, '#8b4513');
          // Eyes
          drawPixelRect(ox+5, oy+5+by, 2, 2, '#3498db');
          drawPixelRect(ox+8, oy+5+by, 2, 2, '#3498db');
          // Hood
          drawPixelRect(ox+2, oy+1+by, 10, 3, '#1a5276');
          drawPixelRect(ox+1, oy+3+by, 2, 6, '#1a5276');
          drawPixelRect(ox+11, oy+3+by, 2, 6, '#1a5276');
        }

        let anim;
        function render() {
          frameRef.current++;
          const f = frameRef.current;
          ctx.fillStyle = '#0a1a0a';
          ctx.fillRect(0, 0, W, H);
          // Ground
          ctx.fillStyle = '#1a472a';
          ctx.fillRect(0, 32*PX, W, H);
          // Grass spots
          const grassColors = ['#2d5a3f','#1e5631','#174023'];
          for (let i = 0; i < 20; i++) {
            ctx.fillStyle = grassColors[i%3];
            ctx.fillRect(((i*37+11)%180)*PX, (33+(i%4))*PX, 3*PX, 1*PX);
          }
          // Trees
          drawTree(4, 5, 0);
          drawTree(28, 2, 1);
          drawTree(120, 3, 3); // purple mystic tree
          drawTree(148, 6, 2);
          drawTree(170, 1, 0);
          // Player walking
          const px = 65 + Math.sin(f * 0.02) * 15;
          const bob = Math.sin(f * 0.08) * 0.6;
          drawPlayer(px, 12, bob);
          // Stars / particles
          ctx.fillStyle = '#9b59b6';
          for (let i = 0; i < 5; i++) {
            const sx = (f * 0.7 + i * 40) % 190;
            const sy = 4 + Math.sin(f * 0.03 + i * 2) * 3;
            const size = (Math.sin(f * 0.05 + i) > 0.3) ? 1 : 0;
            if (size) ctx.fillRect(sx*PX, sy*PX, PX, PX);
          }
          anim = requestAnimationFrame(render);
        }
        render();
        return () => cancelAnimationFrame(anim);
      }, []);

      return (
        <a href="https://aaronunify2.github.io/UnifyVersion1/Forest.html" target="_blank" rel="noopener"
          onClick={e => { if (onClick) { e.preventDefault(); onClick(); } }}
          style={{ display: "block", border: "2px solid #2e7d32", background: "#0a1a0a", overflow: "hidden", cursor: "pointer", textDecoration: "none", transition: "border-color 0.2s" }}
          onMouseEnter={e => e.currentTarget.style.borderColor = "#4a9a4a"}
          onMouseLeave={e => e.currentTarget.style.borderColor = "#2e7d32"}
        >
          <canvas ref={canvasRef} width={570} height={150}
            style={{ width: "100%", height: "auto", display: "block", imageRendering: "pixelated" }} />
          <div style={{ padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "8px", borderTop: "1px solid #1a3a1a" }}>
            <div>
              <div style={{ fontFamily: "'Special Elite', monospace", fontSize: "18px", color: "#e8e8d0" }}>Mystic Forest Walker</div>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: "13px", color: "#4a9a4a", marginTop: "2px" }}>He's been walking since you opened this page. He will never stop. You might as well click him.</div>
            </div>
            <div style={{ fontFamily: "'VT323', monospace", fontSize: "14px", color: "#2e7d32", background: "#2e7d3222", padding: "4px 12px", border: "1px solid #2e7d3255", letterSpacing: "1px" }}>PLAY</div>
          </div>
        </a>
      );
    }

    function BrickBreakerBanner() {
      const canvasRef = React.useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const W = 570, H = 180;
        const S = 2;
        const colors = ['#e040fb','#ff1744','#ff9100','#ffea00','#00e676','#00e5ff','#2979ff','#d500f9'];
        const COLS = 19, ROWS = 4, BW = 14, BH = 5, BPAD = 1, BOFFX = 3, BOFFY = 3;
        let bricks, ball, paddle, state, stateTimer, level, anim;

        function initBricks(rows) {
          const b = [];
          for (let r = 0; r < rows; r++) for (let c = 0; c < COLS; c++) {
            b.push({ x: BOFFX + c * (BW + BPAD), y: BOFFY + r * (BH + BPAD), w: BW, h: BH, alive: true, color: colors[(r + c) % colors.length] });
          }
          return b;
        }
        function reset(lvl) {
          level = lvl || 1;
          const rows = Math.min(ROWS + (level - 1) * 2, Math.floor((H/S - 30) / (BH + BPAD)));
          bricks = initBricks(rows);
          ball = { x: W/S/2, y: H/S - 18, dx: 1.2, dy: -1.2, r: 2 };
          paddle = { x: W/S/2 - 12, y: H/S - 12, w: 24, h: 3, dir: 1 };
          state = 'play';
          stateTimer = 0;
        }
        reset(1);

        function render() {
          ctx.fillStyle = '#0a0a20';
          ctx.fillRect(0, 0, W, H);

          if (state === 'play') {
            paddle.x += paddle.dir * 0.8;
            if (paddle.x + paddle.w > W/S - 2) paddle.dir = -1;
            if (paddle.x < 2) paddle.dir = 1;
            const targetX = ball.x - paddle.w / 2;
            paddle.x += (targetX - paddle.x) * 0.06;

            ball.x += ball.dx;
            ball.y += ball.dy;
            if (ball.x - ball.r < 0 || ball.x + ball.r > W/S) ball.dx = -ball.dx;
            if (ball.y - ball.r < 0) ball.dy = -ball.dy;

            if (ball.y + ball.r >= paddle.y && ball.y + ball.r <= paddle.y + paddle.h + 2 && ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
              ball.dy = -Math.abs(ball.dy);
              ball.dx += (ball.x - (paddle.x + paddle.w/2)) * 0.08;
            }
            if (ball.y > H/S) { ball.y = H/S - 18; ball.dy = -Math.abs(ball.dy); }

            let hitCount = 0;
            bricks.forEach(b => {
              if (!b.alive) return;
              if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w && ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
                b.alive = false; ball.dy = -ball.dy; hitCount++;
              }
            });

            const alive = bricks.filter(b => b.alive).length;
            if (alive === 0) {
              state = 'win'; stateTimer = 0;
            }
          }

          // Draw bricks
          bricks.forEach(b => {
            if (!b.alive) return;
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x * S, b.y * S, b.w * S, b.h * S);
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.fillRect(b.x * S, b.y * S, b.w * S, 1 * S);
          });
          // Paddle
          ctx.fillStyle = '#00e676';
          ctx.fillRect(paddle.x * S, paddle.y * S, paddle.w * S, paddle.h * S);
          ctx.fillStyle = 'rgba(255,255,255,0.4)';
          ctx.fillRect(paddle.x * S, paddle.y * S, paddle.w * S, 1 * S);
          // Ball
          ctx.fillStyle = '#fff';
          ctx.fillRect((ball.x - ball.r) * S, (ball.y - ball.r) * S, ball.r * 2 * S, ball.r * 2 * S);
          // Ball trail
          ctx.fillStyle = 'rgba(224,64,251,0.3)';
          ctx.fillRect((ball.x - ball.dx * 2 - ball.r) * S, (ball.y - ball.dy * 2 - ball.r) * S, ball.r * 2 * S, ball.r * 2 * S);

          if (state === 'win') {
            stateTimer++;
            ctx.fillStyle = '#0a0a20';
            ctx.fillRect(0, 0, W, H);
            // Paddle still visible
            ctx.fillStyle = '#00e676';
            ctx.fillRect(paddle.x * S, paddle.y * S, paddle.w * S, paddle.h * S);

            if (stateTimer < 60) {
              ctx.font = 'bold 28px "Courier Prime", monospace';
              ctx.textAlign = 'center';
              ctx.fillStyle = '#ffea00';
              ctx.fillText('YOU WIN!', W/2, H/2 - 10);
              ctx.font = '14px "VT323", monospace';
              ctx.fillStyle = '#666680';
              ctx.fillText('Level ' + level + ' cleared', W/2, H/2 + 14);
            } else if (stateTimer < 70) {
              ctx.font = 'bold 20px "Courier Prime", monospace';
              ctx.textAlign = 'center';
              ctx.fillStyle = '#e040fb';
              ctx.fillText('LEVEL ' + (level + 1), W/2, H/2);
            } else {
              reset(level + 1);
            }
          }

          if (level > 3 && state === 'play' && bricks.filter(b => b.alive).length > bricks.length * 0.9) {
            stateTimer++;
            if (stateTimer > 180) reset(1);
          }

          anim = requestAnimationFrame(render);
        }
        render();
        return () => cancelAnimationFrame(anim);
      }, []);

      return (
        <a href="https://aaronunify2.github.io/UnifyVersion1/3d194.html" target="_blank" rel="noopener"
          style={{ display: "block", border: "2px solid #e040fb", background: "#0a0a20", overflow: "hidden", cursor: "pointer", textDecoration: "none", transition: "border-color 0.2s" }}
          onMouseEnter={e => e.currentTarget.style.borderColor = "#ff80ff"}
          onMouseLeave={e => e.currentTarget.style.borderColor = "#e040fb"}
        >
          <canvas ref={canvasRef} width={570} height={180}
            style={{ width: "100%", height: "auto", display: "block", imageRendering: "pixelated" }} />
          <div style={{ padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "8px", borderTop: "1px solid #3a1040" }}>
            <div>
              <div style={{ fontFamily: "'Special Elite', monospace", fontSize: "18px", color: "#e8e8d0" }}>3D194 Brick Breaker</div>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: "13px", color: "#e040fb", marginTop: "2px" }}>This ball has been breaking bricks for eternity and it has learned nothing. Sound familiar?</div>
            </div>
            <div style={{ fontFamily: "'VT323', monospace", fontSize: "14px", color: "#e040fb", background: "#e040fb22", padding: "4px 12px", border: "1px solid #e040fb55", letterSpacing: "1px" }}>PLAY</div>
          </div>
        </a>
      );
    }

    function LoneClownBanner({ onClick }) {
      const canvasRef = React.useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const W = 570, H = 170, S = 2;
        let anim, f = 0;
        const vanX = { v: W/S * 0.4 };
        let vanDX = 0.6, vanWobble = 0;

        function px(x,y,w,h,c) { ctx.fillStyle=c; ctx.fillRect(x*S,y*S,w*S,h*S); }

        function drawMoon(x, y) {
          ctx.fillStyle = '#e8e8b0';
          ctx.beginPath(); ctx.arc(x*S, y*S, 14*S, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#d8d8a0';
          ctx.beginPath(); ctx.arc((x+2)*S, (y-1)*S, 12*S, 0, Math.PI*2); ctx.fill();
        }

        function drawTree(ox, oy, h, dark) {
          const tc = dark ? '#1a2a1a' : '#0f1f0f';
          const lc = dark ? ['#0a1a0a','#0f220f','#122812'] : ['#0a140a','#0d1a0d','#101e10'];
          px(ox+3, oy+h-16, 3, 16, tc);
          px(ox-2, oy, 13, h-16, lc[0]);
          px(ox-1, oy+2, 11, h-18, lc[1]);
          px(ox+1, oy+4, 7, h-20, lc[2]);
          px(ox+3, oy-3, 3, 5, lc[0]);
        }

        function drawVan(x, y, wobble) {
          const wy = Math.sin(wobble) * 0.8;
          const vy = y + wy;
          px(x, vy-12, 20, 10, '#d8d8d0');
          px(x+1, vy-11, 7, 4, '#4a6a8a');
          px(x+12, vy-11, 7, 4, '#4a6a8a');
          px(x-1, vy-2, 22, 4, '#c0c0b8');
          px(x+2, vy+2, 4, 2, '#222');
          px(x+15, vy+2, 4, 2, '#222');
          // headlights
          ctx.fillStyle = 'rgba(255,255,180,0.15)';
          ctx.beginPath();
          ctx.moveTo((x+20)*S, (vy-6)*S);
          ctx.lineTo((x+45)*S, (vy-14)*S);
          ctx.lineTo((x+45)*S, (vy+4)*S);
          ctx.closePath();
          ctx.fill();
        }

        function render() {
          f++;
          ctx.fillStyle = '#060812';
          ctx.fillRect(0, 0, W, H);

          // Stars
          ctx.fillStyle = '#ffffff';
          for (let i = 0; i < 30; i++) {
            const sx = (i * 73 + 11) % (W/S), sy = (i * 37 + 7) % 50;
            const twinkle = Math.sin(f * 0.02 + i) > 0.5 ? 1 : 0;
            if (twinkle) ctx.fillRect(sx*S, sy*S, S, S);
          }

          drawMoon(W/S * 0.72, 20);

          // Fog
          ctx.fillStyle = 'rgba(100,120,140,0.04)';
          for (let i = 0; i < 5; i++) {
            const fx = ((f * 0.15 + i * 60) % (W/S + 40)) - 20;
            ctx.fillRect(fx*S, (55+i*3)*S, 50*S, 6*S);
          }

          // Back trees
          for (let i = 0; i < 12; i++) drawTree(i * 25 - 5, 20 + (i%3)*4, 40 + (i%2)*8, true);

          // Dirt road
          px(0, 70, W/S, 16, '#2a1f14');
          px(0, 71, W/S, 14, '#33261a');
          // Road texture
          for (let i = 0; i < 15; i++) px(((i*19+f*0.3)%(W/S)), 76, 6, 1, '#3d2e20');

          // Van
          vanWobble += 0.12;
          vanX.v += vanDX + Math.sin(f * 0.03) * 0.3;
          if (vanX.v > W/S + 10) { vanX.v = -30; vanDX = 0.4 + Math.random() * 0.4; }
          drawVan(vanX.v, 68, vanWobble);

          // Front trees (silhouettes)
          drawTree(10, 10, 65, false);
          drawTree(50, 15, 55, false);
          drawTree(W/S-20, 8, 68, false);
          drawTree(W/S-55, 18, 52, false);

          // Moon occluded by tree
          ctx.fillStyle = '#060812';
          ctx.fillRect((W/S-20)*S, 0, 15*S, 75*S);

          anim = requestAnimationFrame(render);
        }
        render();
        return () => cancelAnimationFrame(anim);
      }, []);

    function EconAddendumBanner({ onClick }) {
      const canvasRef = React.useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const W = 570, H = 150, S = 2;
        let anim, f = 0;

        const icons = [
          { x: 38, sym: "pizza", color: "#e67e22" },
          { x: 90, sym: "oven", color: "#aa3333" },
          { x: 142, sym: "gear", color: "#4a9a4a" },
          { x: 194, sym: "coin", color: "#ffd700" },
          { x: 232, sym: "store", color: "#c0a060" },
          { x: 262, sym: "ripple", color: "#4a9aea" }
        ];

        function drawIcon(x, y, sym, color, alpha) {
          ctx.globalAlpha = alpha;
          ctx.fillStyle = color;
          if (sym === "pizza") {
            ctx.beginPath(); ctx.moveTo(x*S, (y-6)*S); ctx.lineTo((x+5)*S, (y+4)*S); ctx.lineTo((x-5)*S, (y+4)*S); ctx.fill();
            ctx.fillStyle = "#ffd700"; ctx.fillRect((x-1)*S, (y-2)*S, 2*S, 2*S);
          } else if (sym === "oven") {
            ctx.fillRect((x-4)*S, (y-4)*S, 8*S, 8*S);
            ctx.fillStyle = "#1a1a2e"; ctx.fillRect((x-2)*S, (y-2)*S, 4*S, 3*S);
            ctx.fillStyle = "#e67e22"; ctx.fillRect((x-1)*S, (y+2)*S, 1*S, 1*S); ctx.fillRect((x+1)*S, (y+2)*S, 1*S, 1*S);
          } else if (sym === "gear") {
            for (let i = 0; i < 4; i++) {
              const a = (i/4)*Math.PI*2; ctx.fillRect((x+Math.cos(a)*4-1)*S,(y+Math.sin(a)*4-1)*S,2*S,2*S);
            }
            ctx.beginPath(); ctx.arc(x*S,y*S,3*S,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="#1a1a2e"; ctx.beginPath(); ctx.arc(x*S,y*S,1.5*S,0,Math.PI*2); ctx.fill();
          } else if (sym === "coin") {
            ctx.beginPath(); ctx.arc(x*S,y*S,4*S,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="#1a1a2e"; ctx.fillRect((x-1)*S,(y-2)*S,2*S,4*S);
          } else if (sym === "store") {
            ctx.fillRect((x-5)*S,(y-2)*S,10*S,6*S);
            ctx.fillStyle="#1a1a2e"; ctx.fillRect((x-1)*S,(y)*S,2*S,4*S);
            ctx.beginPath(); ctx.moveTo((x-6)*S,(y-2)*S); ctx.lineTo(x*S,(y-6)*S); ctx.lineTo((x+6)*S,(y-2)*S); ctx.fill();
            ctx.fillStyle = color;
          } else if (sym === "ripple") {
            for (let r = 2; r <= 5; r++) { ctx.beginPath(); ctx.arc(x*S,y*S,r*S,0,Math.PI*2); ctx.strokeStyle=color; ctx.globalAlpha=alpha*(1-r/6); ctx.lineWidth=S; ctx.stroke(); }
          }
          ctx.globalAlpha = 1;
        }

        function render() {
          f++;
          ctx.fillStyle = '#080810';
          ctx.fillRect(0, 0, W, H);

          // Background grid
          ctx.strokeStyle = '#111122';
          ctx.lineWidth = 1;
          for (let gx = 0; gx < W/S; gx += 10) { ctx.beginPath(); ctx.moveTo(gx*S,0); ctx.lineTo(gx*S,H); ctx.stroke(); }
          for (let gy = 0; gy < H/S; gy += 10) { ctx.beginPath(); ctx.moveTo(0,gy*S); ctx.lineTo(W,gy*S); ctx.stroke(); }

          // Animated curve
          const baseY = H/S - 15;
          const curvePoints = [];
          const drawProgress = Math.min(1, (f % 300) / 200);
          const totalPts = Math.floor(W/S * drawProgress);

          ctx.beginPath();
          for (let i = 0; i <= totalPts; i++) {
            const t = i / (W/S);
            const y = baseY - Math.pow(t, 2.2) * (baseY - 12);
            if (i === 0) ctx.moveTo(i*S, y*S); else ctx.lineTo(i*S, y*S);
            curvePoints.push({ x: i, y });
          }

          // Gradient stroke
          const grad = ctx.createLinearGradient(0, H, W * drawProgress, 0);
          grad.addColorStop(0, '#aa3333');
          grad.addColorStop(0.3, '#e67e22');
          grad.addColorStop(0.6, '#ffd700');
          grad.addColorStop(1, '#4a9aea');
          ctx.strokeStyle = grad;
          ctx.lineWidth = S * 1.5;
          ctx.stroke();

          // Glow under curve
          if (curvePoints.length > 2) {
            ctx.beginPath();
            ctx.moveTo(0, baseY*S);
            curvePoints.forEach(p => ctx.lineTo(p.x*S, p.y*S));
            ctx.lineTo(curvePoints[curvePoints.length-1].x*S, baseY*S);
            ctx.closePath();
            const fillGrad = ctx.createLinearGradient(0, 0, W * drawProgress, 0);
            fillGrad.addColorStop(0, 'rgba(170,51,51,0.08)');
            fillGrad.addColorStop(0.5, 'rgba(230,126,34,0.06)');
            fillGrad.addColorStop(1, 'rgba(74,154,234,0.04)');
            ctx.fillStyle = fillGrad;
            ctx.fill();
          }

          // Icons along curve
          icons.forEach((icon, i) => {
            if (icon.x > totalPts) return;
            const t = icon.x / (W/S);
            const y = baseY - Math.pow(t, 2.2) * (baseY - 12);
            const bob = Math.sin(f * 0.03 + i * 1.5) * 1.5;
            drawIcon(icon.x, y - 8 + bob, icon.sym, icon.color, 0.8);
          });

          // Axis labels
          ctx.fillStyle = '#333355';
          ctx.font = (7*S) + 'px "VT323", monospace';
          ctx.fillText('ZERO', 4, (baseY+7)*S);
          if (drawProgress > 0.9) ctx.fillText('SOMETHING', (W/S - 45)*S, 18*S);

          // Reset animation
          if (f % 300 > 280) {
            ctx.fillStyle = 'rgba(8,8,16,' + ((f%300-280)/20) + ')';
            ctx.fillRect(0,0,W,H);
          }

          anim = requestAnimationFrame(render);
        }
        render();
        return () => cancelAnimationFrame(anim);
      }, []);

      return (
        <div onClick={onClick}
          style={{ display: "block", border: "2px solid #4a9aea", background: "#080810", overflow: "hidden", cursor: "pointer", textDecoration: "none", transition: "border-color 0.2s" }}
          onMouseEnter={e => e.currentTarget.style.borderColor = "#6ab0ff"}
          onMouseLeave={e => e.currentTarget.style.borderColor = "#4a9aea"}
        >
          <canvas ref={canvasRef} width={570} height={150}
            style={{ width: "100%", height: "auto", display: "block", imageRendering: "auto" }} />
          <div style={{ padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "8px", borderTop: "1px solid #1a2040" }}>
            <div>
              <div style={{ fontFamily: "'Special Elite', monospace", fontSize: "18px", color: "#e8e8d0" }}>Econ Addendum</div>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: "13px", color: "#4a9aea", marginTop: "2px" }}>Six articles about money, time, and knowing when to stop eating pizza.</div>
            </div>
            <div style={{ fontFamily: "'VT323', monospace", fontSize: "14px", color: "#4a9aea", background: "#4a9aea22", padding: "4px 12px", border: "1px solid #4a9aea55", letterSpacing: "1px" }}>READ</div>
          </div>
        </div>
      );
    }

              </div>
            </div>
            {site.twitter && <div style={{ borderTop: "1px dashed #333366", marginTop: "20px", paddingTop: "20px" }}><h3 style={{ fontFamily: "'Special Elite', monospace", fontSize: "18px", color: "#e67e22", letterSpacing: "2px", textTransform: "uppercase", marginBottom: "12px" }}>Find Me</h3><a href={site.twitter} target="_blank" rel="noopener" style={{ fontFamily: "'Courier Prime', monospace", fontSize: "15px", color: "#4a9aea" }}>@UGoalsetter on X/Twitter</a></div>}
          </div>
        </div>
      );
    }

    // ==========================================
    // APP
    // ==========================================
    function App() {
      const { content, loading } = useContent();
      const [currentPage, setCurrentPage] = useState("home");
      const [selectedTool, setSelectedTool] = useState(null);
      const [selectedArticle, setSelectedArticle] = useState(null);
      const setPage = useCallback(page => { setCurrentPage(page); if(page!=="tools") setSelectedTool(null); if(page!=="articles") setSelectedArticle(null); window.scrollTo({top:0,behavior:"smooth"}); }, []);
      if (loading) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", fontFamily: "'VT323', monospace", fontSize: "24px", color: "#4a4a8a" }}>Loading The Post Idealist...</div>;
      if (!content) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", fontFamily: "'Courier Prime', monospace", fontSize: "16px", color: "#aa3333", textAlign: "center", padding: "20px" }}>Failed to load content.json.</div>;
      const pg = () => {
        switch(currentPage) {
          case "home": return <HomePage content={content} setPage={setPage} setSelectedTool={setSelectedTool} setSelectedArticle={setSelectedArticle} />;
          case "tools": return <ToolsPage content={content} selectedTool={selectedTool} setSelectedTool={setSelectedTool} />;
          case "articles": return <ArticlesPage content={content} selectedArticle={selectedArticle} setSelectedArticle={setSelectedArticle} />;
          case "novel": return <NovelPage content={content} />;
          case "about": return <AboutPage content={content} />;
          default: return <HomePage content={content} setPage={setPage} setSelectedTool={setSelectedTool} setSelectedArticle={setSelectedArticle} />;
        }
      };
      return (
        <div style={{ maxWidth: "1100px", margin: "0 auto", minHeight: "100vh", display: "flex", flexDirection: "column", background: "#1a1a2e", boxShadow: "0 0 60px rgba(0,0,0,0.5)" }}>
          <Header currentPage={currentPage} setPage={setPage} site={content.site} />
          <div className="site-layout" style={{ display: "flex", gap: "24px", padding: "24px 20px", flex: 1 }}>
            <main className="site-main" style={{ flex: 1, minWidth: 0 }}>{pg()}</main>
            <Sidebar site={content.site} />
          </div>
          <Footer site={content.site} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
